version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: node_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: backend_db
    ports:
      # Allow overriding the host port via POSTGRES_HOST_PORT environment variable.
      # Defaults to 5432 but will be set automatically by the setup script if that port is busy.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    driver: local
